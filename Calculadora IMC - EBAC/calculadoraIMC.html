<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="person.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="calculadora">
        <h1>Calculadora</h1>
        <p>Calcule aqui o seu IMC</p>
                <div class="peso">
                    <label for="peso">Seu Peso (kg)</label>
                    <input type="number" placeholder="Ex: 70" id="peso">
                </div>
                <div class="altura">
                    <label for="altura">Sua altura (m)</label>
                    <input type="number" placeholder="Ex: 1.75" id="altura">
                </div>
                <p><button onclick="calcularIMC()">Calcular</button></p>
                <p id="resultado" class="resultado"></p>
                <p id="classficar" class="classificar"></p>
    </div>
</body>
</html>
